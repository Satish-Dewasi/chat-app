<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCP Chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <!-- ── Username Modal ──────────────────────────────────────────── -->
    <div id="modal-overlay">
      <div id="modal">
        <div class="modal-icon">💬</div>
        <h2>Join the Chat</h2>
        <p>Connected via TCP socket. Choose a username to enter the room.</p>
        <div class="input-group">
          <label>Username</label>
          <input
            type="text"
            id="username-input"
            placeholder="e.g. Alice"
            maxlength="32"
            autocomplete="off"
          />
        </div>
        <button class="btn-primary" id="join-btn">Join Room →</button>
        <div class="modal-error" id="modal-error"></div>
      </div>
    </div>

    <!-- ── Main App ────────────────────────────────────────────────── -->
    <div id="app">
      <!-- Sidebar -->
      <div id="sidebar">
        <div class="logo">
          <div class="logo-title">
            <div class="logo-icon">⚡</div>
            <h1>TCP Chat</h1>
          </div>
          <!-- <div class="logo-sub">POSIX SOCKETS · C++ · LINUX</div> -->
        </div>

        <div class="conn-status">
          <div class="status-dot" id="status-dot"></div>
          <div class="status-text" id="status-text">connecting...</div>
        </div>

        <div class="section-label">Online</div>
        <div id="users-list"></div>

        <div class="sidebar-footer">
          <div class="tech-badge">
            <div class=""></div>
            ⚙️ Setting
          </div>
        </div>
      </div>

      <!-- Chat main -->
      <div id="chat-main">
        <div id="chat-header">
          <div class="chat-header-left">
            <div class="channel-icon">#</div>
            <div class="channel-info">
              <h2>general</h2>
              <!-- <p>ws://localhost:8081 → tcp://localhost:8080</p> -->
            </div>
          </div>
          <div class="header-stats">
            <div class="stat-pill">
              <div class="dot"></div>
              <span id="online-count">0 online</span>
            </div>
          </div>
        </div>

        <div id="messages">
          <div id="empty-state">
            <div class="empty-icon">📡</div>
            <div class="empty-text">no messages yet — say something!</div>
          </div>
        </div>

        <div id="input-area">
          <div id="input-form">
            <textarea
              id="msg-input"
              placeholder="Type a message..."
              rows="1"
              disabled
            ></textarea>
            <button id="send-btn" disabled>↑</button>
          </div>
          <!-- <div class="input-hint">Enter to send · Shift+Enter for new line</div> -->
        </div>
      </div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
